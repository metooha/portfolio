name: lint-css

on:
  pull_request:
    paths:
      - 'src/components/**/*.css'
      - 'src/patterns/**/*.css'
      - '.stylelintrc.cjs'
      - 'package.json'
  push:
    branches: [main]

jobs:
  stylelint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:css
