  cardTitle: "Everyday Sans UI"
  shortDescription: "How a variable font ended the trade-off between brand hierarchy and web performance at Walmart."
  cardDescription: "Brand held back on font weights because each new file carried a performance cost. The variable font ended that compromise — permanently."
