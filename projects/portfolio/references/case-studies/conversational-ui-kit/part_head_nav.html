<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conversational UI Design System · Amy Ha</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --blue:   #0052e2;
    --dark:   #011e60;
    --yellow: #ffc220;
    --sky:    #a9ddf7;
    --blue2:  #4ebdf5;
    --muted:  #74767c;
    --light:  #eef5ff;
    --border: #e3e4e5;
    /* semantic accents mapped onto the brand palette */
    --red:    #011e60;
    --green:  #0052e2;
    --green2: #0052e2;
    --orange: #4ebdf5;
    --purple: #4ebdf5;
    --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-head: 'DM Sans', sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-body);background:#fff;color:#2e2f32;line-height:1.65;-webkit-font-smoothing:antialiased;}

  nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0.8rem 2rem;display:flex;align-items:center;gap:0.75rem;}
  nav .dot{width:10px;height:10px;border-radius:50%;background:var(--yellow);}
  nav span{font-size:0.72rem;font-weight:600;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}

  .hero{background:var(--dark);color:#fff;padding:6rem 2rem 5rem;}
  .hero-inner{max-width:820px;margin:0 auto;}
  .hero-tag{display:inline-block;background:var(--yellow);color:var(--dark);font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.28rem 0.7rem;margin-bottom:1.75rem;}
  .hero h1{font-family:var(--font-head);font-size:clamp(2.4rem,5vw,4rem);line-height:1.15;margin-bottom:1.25rem;}
  .hero h1 em{font-style:italic;color:var(--yellow);}
  .hero-sub{font-size:1.1rem;color:rgba(255,255,255,0.65);max-width:580px;line-height:1.75;}
  .hero-meta{display:flex;flex-wrap:wrap;gap:1.5rem;margin-top:2.5rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,0.12);}
  .hero-meta-item .hm-label{font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:0.2rem;}
  .hero-meta-item .hm-val{font-size:0.85rem;color:rgba(255,255,255,0.75);}

  .section{padding:5rem 2rem;}
  .section.alt{background:var(--light);}
  .section.dark{background:var(--dark);}
  .section-inner{max-width:820px;margin:0 auto;}
  .eyebrow{font-size:0.68rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--blue);margin-bottom:0.6rem;}
  .section.dark .eyebrow{color:rgba(255,193,32,0.8);}
  h2.section-title{font-family:var(--font-head);font-size:clamp(1.7rem,3vw,2.4rem);line-height:1.2;margin-bottom:1rem;}
  .section.dark h2.section-title{color:#fff;}
  .section-lead{font-size:1rem;color:var(--muted);line-height:1.75;max-width:640px;margin-bottom:2.5rem;}
  .section.dark .section-lead{color:rgba(255,255,255,0.55);}

  /* TENSION PANEL */
  .tension-vs{display:grid;grid-template-columns:1fr auto 1fr;gap:1.5rem;margin-top:2rem;align-items:center;}
  @media(max-width:600px){.tension-vs{grid-template-columns:1fr;}}
  .t-side{background:#fff;border:1px solid var(--border);border-radius:8px;padding:1.5rem;}
  .t-side.left-side{border-top:3px solid var(--dark);}
  .t-side.right-side{border-top:3px solid var(--blue2);}
  .t-side .t-who{font-size:0.65rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:0.5rem;color:var(--muted);}
  .t-side h3{font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:0.65rem;}
  .t-side p{font-size:0.85rem;color:var(--muted);line-height:1.65;}
  .vs-badge{font-size:1.5rem;font-weight:700;color:var(--border);text-align:center;}
  .resolved{margin-top:1.5rem;background:rgba(169,221,247,0.18);border:1px solid var(--sky);border-radius:8px;padding:1.25rem 1.5rem;display:flex;gap:1rem;align-items:flex-start;}
  .resolved .r-icon{font-size:1.2rem;flex-shrink:0;margin-top:0.1rem;}
  .resolved p{font-size:0.9rem;color:var(--dark);line-height:1.6;}
  .resolved strong{color:var(--blue);}

  /* STAT ROW */
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:3rem;}
  .stat{text-align:center;background:var(--dark);border-radius:8px;padding:1.75rem 1rem;}
  .stat .big{font-family:var(--font-head);font-size:2.4rem;color:var(--yellow);line-height:1;}
  .stat .lbl{font-size:0.8rem;color:rgba(255,255,255,0.5);margin-top:0.4rem;line-height:1.4;}
  .section.alt .stat{background:#fff;border:1px solid var(--border);}
  .section.alt .stat .big{color:var(--blue);}
  .section.alt .stat .lbl{color:var(--muted);}

  /* MATTER/PRINCIPLE CARDS */
  .matter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.1rem;}
  .matter-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:1.5rem;border-top:3px solid var(--blue);}
  .matter-card .mc-icon{font-size:1.5rem;margin-bottom:0.75rem;}
  .matter-card h3{font-size:0.95rem;font-weight:700;margin-bottom:0.4rem;color:var(--dark);}
  .matter-card p{font-size:0.85rem;color:var(--muted);line-height:1.6;}
  .section.alt .matter-card{background:#fff;}

  /* JOURNEY TIMELINE */
  .journey{margin-top:0.5rem;}
  .journey-item{display:grid;grid-template-columns:200px 40px 1fr;margin-bottom:0;}
  @media(max-width:640px){.journey-item{grid-template-columns:1fr;}}
  .ji-left{padding:1.75rem 1.25rem 1.75rem 0;text-align:right;}
  .ji-date{font-size:0.68rem;font-weight:700;color:var(--muted);letter-spacing:0.06em;margin-bottom:0.35rem;}
  .ji-phase{font-size:0.95rem;font-weight:600;font-style:italic;line-height:1.3;color:var(--dark);}
  .ji-who{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.6rem;justify-content:flex-end;}
  .ji-mid{display:flex;flex-direction:column;align-items:center;padding-top:1.9rem;position:relative;}
  .ji-mid::before{content:'';position:absolute;top:0;bottom:0;left:50%;width:2px;background:var(--border);transform:translateX(-50%);}
  .journey-item:first-child .ji-mid::before{top:1.9rem;}
  .journey-item:last-child .ji-mid::before{bottom:calc(100% - 2.2rem);}
  .ji-dot{width:13px;height:13px;border-radius:50%;border:2px solid #fff;position:relative;z-index:1;flex-shrink:0;}
  .mood-friction .ji-dot{background:var(--muted);box-shadow:0 0 0 2px var(--muted);}
  .mood-blocker .ji-dot{background:var(--dark);box-shadow:0 0 0 2px var(--dark);}
  .mood-progress .ji-dot{background:var(--blue2);box-shadow:0 0 0 2px var(--blue2);}
  .mood-win .ji-dot{background:var(--blue);box-shadow:0 0 0 2px var(--blue);}
  .ji-right{padding:1.75rem 0 1.75rem 1.25rem;}
  .who-chip{font-size:0.62rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:0.2rem 0.5rem;border-radius:20px;}
  .who-brand{background:rgba(0,82,226,0.10);color:#0052e2;}
  .who-eng{background:rgba(1,30,96,0.08);color:#011e60;}
  .who-a11y{background:rgba(78,189,245,0.18);color:#011e60;}
  .who-foundry{background:rgba(255,194,32,0.22);color:var(--dark);}
  .ji-story{font-size:0.92rem;line-height:1.7;color:var(--dark);margin-bottom:1rem;}
  .ji-tension{background:var(--light);border-left:3px solid var(--muted);padding:0.65rem 0.9rem;border-radius:0 4px 4px 0;font-size:0.8rem;color:var(--dark);line-height:1.55;margin-bottom:0.65rem;}
  .ji-win{background:rgba(169,221,247,0.18);border-left:3px solid var(--blue);padding:0.65rem 0.9rem;border-radius:0 4px 4px 0;font-size:0.8rem;color:var(--dark);line-height:1.55;margin-bottom:0.65rem;}
  .ji-note{background:var(--light);border-left:3px solid var(--blue);padding:0.65rem 0.9rem;border-radius:0 4px 4px 0;font-size:0.8rem;color:var(--dark);line-height:1.55;margin-bottom:0.65rem;}

  /* PLATFORM GRID */
  .platform-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1.5rem 0;}
  @media(max-width:720px){.platform-grid{grid-template-columns:1fr;}}
  .platform-card{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .plat-header{padding:0.7rem 1rem;display:flex;align-items:center;gap:0.5rem;border-bottom:1px solid var(--border);background:var(--dark);}
  .plat-name{font-size:0.85rem;font-weight:700;color:#fff;}
  .plat-tag{font-size:0.62rem;font-weight:700;letter-spacing:.07em;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.15);padding:0.1rem 0.4rem;border-radius:3px;}
  .plat-body{padding:0.85rem 1rem;}
  .plat-req{font-size:0.78rem;color:var(--muted);margin-bottom:0.35rem;line-height:1.5;display:flex;gap:0.4rem;}
  .plat-req::before{content:'✓';color:var(--blue);font-weight:700;flex-shrink:0;}
  .plat-blocker{font-size:0.75rem;font-weight:700;color:var(--red);margin-top:0.5rem;}
  .plat-win{font-size:0.75rem;font-weight:700;color:var(--green2);margin-top:0.5rem;}

  /* BEFORE/AFTER */
  .ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
  @media(max-width:600px){.ba-grid{grid-template-columns:1fr;}}
  .ba-card{border-radius:8px;padding:1.75rem;}
  .ba-card.before{background:#f6f8fa;border:1px solid var(--border);}
  .ba-card.after{background:rgba(169,221,247,0.15);border:1px solid var(--sky);}
  .ba-label{font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:1rem;}
  .ba-card.before .ba-label{color:var(--muted);}
  .ba-card.after .ba-label{color:var(--blue);}
  .ba-item{display:flex;gap:0.75rem;margin-bottom:1rem;align-items:flex-start;}
  .ba-icon{font-size:1rem;flex-shrink:0;margin-top:0.05rem;}
  .ba-item p{font-size:0.88rem;line-height:1.6;color:var(--dark);}

  /* QUOTE */
  .quote{background:var(--dark);border-radius:10px;padding:2.25rem 2.5rem;margin-top:2rem;}
  .quote-text{font-family:var(--font-head);font-size:1.3rem;font-style:italic;color:#fff;line-height:1.55;margin-bottom:0.75rem;}
  .quote-text::before{content:'\201C';color:var(--yellow);}
  .quote-text::after{content:'\201D';color:var(--yellow);}
  .quote-attr{font-size:0.78rem;color:rgba(255,255,255,0.45);}

  /* NEXT STEPS */
  .next-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-top:2rem;}
  .next-card{border:1px solid var(--border);border-radius:8px;padding:1.5rem;}
  .next-when{font-size:0.65rem;font-weight:700;color:var(--blue);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.4rem;}
  .next-card h4{font-size:0.95rem;font-weight:700;margin-bottom:0.35rem;color:var(--dark);}
  .next-card p{font-size:0.83rem;color:var(--muted);}

  /* PIPELINE DIAGRAM */
  .pipeline-wrap{margin:2.5rem 0;background:var(--dark);border-radius:12px;padding:2rem;}
  .pipeline-svg-wrap{overflow-x:auto;}

  /* SCOPE ITEMS */
  .scope-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin:1.5rem 0;}
  @media(max-width:600px){.scope-grid{grid-template-columns:1fr;}}
  .scope-item{background:#fff;border:1px solid var(--border);border-radius:6px;padding:0.9rem 1.1rem;display:flex;gap:0.75rem;align-items:flex-start;}
  .scope-check{color:var(--green2);font-weight:700;flex-shrink:0;margin-top:0.1rem;}
  .scope-item p{font-size:0.85rem;line-height:1.55;color:var(--dark);}
  .scope-item p strong{font-weight:700;}

  /* DISCOVERY STEPS */
  .discovery-steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:0;margin:1.5rem 0;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .ds-step{padding:1.5rem;border-right:1px solid var(--border);position:relative;}
  .ds-step:last-child{border-right:none;}
  @media(max-width:600px){.ds-step{border-right:none;border-bottom:1px solid var(--border);}.ds-step:last-child{border-bottom:none;}}
  .ds-num{font-family:var(--font-head);font-size:2rem;color:#e3e4e5;line-height:1;margin-bottom:0.6rem;}
  .ds-title{font-size:0.88rem;font-weight:700;color:var(--dark);margin-bottom:0.4rem;}
  .ds-desc{font-size:0.8rem;color:var(--muted);line-height:1.55;}

  /* COMPONENT FLOW */
  .comp-flow{display:flex;flex-wrap:wrap;gap:0;margin:1.5rem 0;align-items:center;}
  .cf-step{background:#fff;border:1px solid var(--border);border-radius:6px;padding:0.5rem 0.75rem;font-size:0.75rem;font-weight:700;color:var(--dark);white-space:nowrap;}
  .cf-arrow{color:var(--blue);font-weight:700;padding:0 0.4rem;font-size:1rem;}
  .cf-new::after{content:'NEW';background:var(--yellow);color:var(--dark);font-size:0.55rem;font-weight:700;letter-spacing:0.1em;padding:0.1rem 0.3rem;border-radius:2px;margin-left:0.3rem;vertical-align:middle;}

  /* RISK BOX */
  .risk-box{background:var(--light);border:1px solid rgba(255,194,32,0.45);border-radius:8px;padding:1.25rem 1.5rem;margin:1.5rem 0;}
  .risk-label{font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--orange);margin-bottom:0.5rem;}
  .risk-box p{font-size:0.85rem;color:var(--dark);line-height:1.65;}
  .risk-item{display:flex;gap:0.5rem;margin-bottom:0.35rem;font-size:0.85rem;color:var(--dark);}
  .risk-item::before{content:'!';font-weight:700;color:var(--orange);flex-shrink:0;}

  footer{background:var(--dark);color:rgba(255,255,255,0.4);text-align:center;padding:2rem;font-size:0.75rem;}

  /* ── PLACEHOLDER IMAGES ─────────────────────────────────────────── */
  .ph { margin: 1.75rem 0; }
  .ph-img {
    background: linear-gradient(148deg, rgba(169,221,247,0.35) 0%, rgba(78,189,245,0.18) 100%);
    border: 1.5px dashed #b0c4de;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    text-align: center;
    padding: 2.75rem 2rem;
    min-height: 270px;
  }
  .ph-img.sm { min-height: 188px; padding: 1.75rem 1.5rem; }
  .ph-img.lg { min-height: 340px; }
  .ph-badge {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: rgba(0,83,226,0.1);
    color: var(--blue);
    padding: 0.2rem 0.6rem;
    border-radius: 3px;
    margin-bottom: 0.15rem;
  }
  .ph-emoji { font-size: 2rem; opacity: 0.28; }
  .ph-title { font-size: 0.88rem; font-weight: 700; color: #557; margin-top: 0.2rem; max-width: 360px; line-height: 1.4; }
  .ph-sub { font-size: 0.73rem; color: #8aa0b8; max-width: 420px; line-height: 1.55; margin-top: 0.15rem; }
  .ph-caption { font-size: 0.72rem; color: var(--muted); margin-top: 0.55rem; line-height: 1.5; font-style: italic; }
  .ph-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.75rem 0; }
  .ph-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; margin: 1.75rem 0; }
  @media(max-width:620px){ .ph-2col,.ph-3col{ grid-template-columns: 1fr; } }
  /* Card grid responsive */
  @media(max-width:640px){
    .wc-card-grid { grid-template-columns: 1fr !important; }
  }
  /* Real embedded screenshots */
  .shot{margin:1.75rem 0;}
  .shot img{width:100%;height:auto;display:block;border-radius:10px;border:1px solid var(--border);box-shadow:0 8px 30px rgba(0,30,96,0.08);}
  .shot.frame img{border:1px solid rgba(0,30,96,0.12);}
  .shot-cap{font-size:0.78rem;color:var(--muted);margin-top:0.6rem;line-height:1.55;}
  .shot-cap strong{color:var(--dark);}
  .shot-2col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1.75rem 0;}
  @media(max-width:640px){.shot-2col{grid-template-columns:1fr;}}
  .section.dark .shot img{border-color:rgba(255,255,255,0.12);box-shadow:0 8px 30px rgba(0,0,0,0.3);}
  .section.dark .shot-cap{color:rgba(255,255,255,0.5);}
  .section.dark .shot-cap strong{color:#fff;}
  /* unlock list */
  .unlock-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.5rem;}
  @media(max-width:600px){.unlock-grid{grid-template-columns:1fr;}}
  .unlock{background:#fff;border:1px solid var(--border);border-radius:8px;padding:1.25rem;border-left:3px solid var(--blue);}
  .unlock h4{font-size:0.9rem;font-weight:700;color:var(--dark);margin-bottom:0.3rem;}
  .unlock p{font-size:0.83rem;color:var(--muted);line-height:1.6;}
  /* day cards */
  .day-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:1.5rem;}
  .day-head{display:flex;align-items:baseline;gap:0.75rem;padding:1.1rem 1.5rem;border-bottom:1px solid var(--border);background:var(--light);}
  .day-tag{font-size:0.6rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--blue);}
  .day-head h3{font-size:1.05rem;color:var(--dark);font-family:var(--font-head);}
  .day-body{padding:1.5rem;}
  .day-body ul{list-style:none;display:flex;flex-direction:column;gap:0.6rem;}
  .day-body li{font-size:0.85rem;color:var(--muted);line-height:1.55;display:flex;gap:0.55rem;align-items:flex-start;}
  .day-body li::before{content:'✓';color:var(--blue);font-weight:700;flex-shrink:0;}
  .day-body li strong{color:var(--dark);}
  /* testimonials */
  .quote-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.75rem;}
  @media(max-width:700px){.quote-grid{grid-template-columns:1fr;}}
  .tcard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.5rem;}
  .tcard .tq{font-size:0.88rem;color:#2e2f32;line-height:1.65;margin-bottom:1rem;}
  .tcard .tn{font-size:0.85rem;font-weight:700;color:var(--dark);}
  .tcard .tr{font-size:0.75rem;color:var(--blue);margin-top:0.1rem;}
  .tcard .tl{font-size:0.7rem;color:var(--muted);margin-top:0.35rem;}
  /* demand stats */
  .demand-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin:1.75rem 0;}
  @media(max-width:640px){.demand-row{grid-template-columns:1fr 1fr;}}
  .demand-stat{text-align:center;padding:1.5rem 0.75rem;background:rgba(169,221,247,0.22);border-radius:10px;}
  .demand-stat .dn{font-family:var(--font-head);font-size:2.6rem;color:var(--blue);line-height:1;}
  .demand-stat .dl{font-size:0.78rem;color:var(--muted);margin-top:0.45rem;line-height:1.4;}
  .signal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.5rem;}
  @media(max-width:760px){.signal-grid{grid-template-columns:1fr;}}
  .signal{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.5rem;border-top:3px solid var(--yellow);}
  .signal .sq{font-size:0.83rem;font-style:italic;color:#2e2f32;line-height:1.6;margin-bottom:0.85rem;}
  .signal .sw{font-size:0.7rem;color:var(--muted);margin-bottom:1rem;}
  .signal h4{font-size:0.92rem;font-weight:700;color:var(--dark);margin-bottom:0.35rem;}
  .signal p{font-size:0.8rem;color:var(--muted);line-height:1.55;}
  .signal .slbl{font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue);margin-bottom:0.4rem;}
  /* dark section placeholders */
  .ph-dark .ph-img {
    background: linear-gradient(148deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
    border-color: rgba(255,255,255,0.12);
  }
  .ph-dark .ph-title { color: rgba(255,255,255,0.35); }
  .ph-dark .ph-sub { color: rgba(255,255,255,0.2); }

    font-size: 0.85rem;
    color: var(--dark);
    line-height: 1.6;
  }

  /* Tension timeline */
  .tension-timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin: 2rem 0 1.5rem;
    position: relative;
    padding-left: 2rem;
  }
  .tension-timeline::before {
    content: '';
    position: absolute;
    left: 7px;
    top: 12px;
    bottom: 12px;
    width: 2px;
    background: var(--border);
  }
  .tt-item {
    display: flex;
    gap: 1.1rem;
    align-items: flex-start;
    padding-bottom: 1.75rem;
    position: relative;
  }
  .tt-item:last-child { padding-bottom: 0; }
  .tt-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 0.25rem;
    position: absolute;
    left: -2rem;
    border: 2px solid #fff;
    z-index: 1;
  }
  .tt-friction .tt-dot { background: var(--muted); box-shadow: 0 0 0 2px var(--muted); }
  .tt-win .tt-dot     { background: var(--blue);  box-shadow: 0 0 0 2px var(--blue); }
  .tt-body { flex: 1; }
  .tt-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .tt-friction .tt-label { color: var(--muted); }
  .tt-win .tt-label     { color: var(--blue); }
  .tt-body p {
    font-size: 0.88rem;
    color: var(--dark);
    line-height: 1.7;
  }

  /* Converse explainer */
  .converse-explainer {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin: 1.75rem 0 0;
  }
  @media(max-width:660px){ .converse-explainer { grid-template-columns: 1fr; } }
  .ce-left {
    padding: 1.4rem 1.5rem;
    background: var(--dark);
  }
  .ce-right {
    padding: 1.4rem 1.5rem;
    background: #fff;
    border-left: 1px solid var(--border);
  }
  @media(max-width:660px){ .ce-right { border-left: none; border-top: 1px solid var(--border); } }
  .ce-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .ce-left .ce-label  { color: rgba(255,255,255,0.4); }
  .ce-right .ce-label { color: var(--muted); }
  .ce-left p { font-size: 0.85rem; color: rgba(255,255,255,0.7); line-height: 1.72; }
  .ce-gap-list { display: flex; flex-direction: column; gap: 0.55rem; }
  .ce-gap-item { display: flex; gap: 0.65rem; align-items: flex-start; }
  .ce-gap-icon { font-size: 0.85rem; color: var(--muted); flex-shrink: 0; margin-top: 0.05rem; }
  .ce-gap-item p { font-size: 0.84rem; color: var(--dark); line-height: 1.55; }
  .ce-note {
    margin-top: 1rem;
    padding: 0.65rem 0.9rem;
    background: rgba(1,30,96,0.06);
    border-left: 3px solid var(--dark);
    border-radius: 0 4px 4px 0;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--dark);
    line-height: 1.5;
  }
  .converse-bridge {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.7;
    margin: 1.25rem 0 0;
    font-style: italic;
  }

  /* Forcing function cards */
  .forcing-functions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin: 1.75rem 0 0;
  }
  @media(max-width:660px){ .forcing-functions { grid-template-columns: 1fr; } }
  .ff-card {
    border-radius: 10px;
    padding: 1.4rem 1.5rem;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
  .ff-platform { background: var(--dark); }
  .ff-org      { background: rgba(0,82,226,0.07); border: 1.5px solid rgba(0,82,226,0.15); }
  .ff-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 0.1rem; }
  .ff-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.35rem;
  }
  .ff-platform .ff-label { color: rgba(255,255,255,0.4); }
  .ff-org .ff-label      { color: var(--blue); }
  .ff-card h3 {
    font-size: 0.9rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }
  .ff-platform h3 { color: #fff; }
  .ff-org h3      { color: var(--dark); }
  .ff-card p { font-size: 0.8rem; line-height: 1.65; }
  .ff-platform p { color: rgba(255,255,255,0.6); }
  .ff-org p      { color: var(--muted); }
  .ff-result {
    margin-top: 1rem;
    padding: 1rem 1.25rem;
    background: rgba(255,194,32,0.08);
    border: 1px solid rgba(255,194,32,0.25);
    border-radius: 8px;
    font-size: 0.88rem;
    color: var(--dark);
    line-height: 1.7;
  }

  /* Leadership pitch block */
  .leadership-pitch {
    margin-top: 1.75rem;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .lp-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue);
    background: rgba(0,82,226,0.06);
    border-bottom: 1px solid var(--border);
    padding: 0.65rem 1.25rem;
  }
  .lp-body {
    padding: 1.25rem;
    background: #fff;
  }
  .lp-body p { font-size: 0.86rem; color: var(--dark); line-height: 1.7; }

  /* Impact grid */
  .impact-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-top: 1.75rem;
  }
  @media(max-width:760px){ .impact-grid { grid-template-columns: repeat(2, 1fr); } }
  @media(max-width:440px){ .impact-grid { grid-template-columns: 1fr; } }
  .impact-card {
    background: var(--dark);
    border-radius: 10px;
    padding: 1.5rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .impact-num {
    font-family: var(--font-head);
    font-size: 2rem;
    font-weight: 900;
    color: var(--yellow);
    line-height: 1;
  }
  .impact-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
  }
  .impact-desc {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.45);
    line-height: 1.55;
  }

  /* Multiplier block */
  .multiplier-block {
    margin-top: 1.75rem;
    background: var(--light);
    border: 1.5px solid var(--border);
    border-left: 4px solid var(--blue);
    border-radius: 0 8px 8px 0;
    padding: 1.4rem 1.5rem;
  }
  .mb-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 0.6rem;
  }
  .multiplier-block p {
    font-size: 0.86rem;
    color: var(--dark);
    line-height: 1.7;
    margin-bottom: 1rem;
  }
  .mb-stats {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .mb-stat {
    display: flex;
    align-items: baseline;
    gap: 0.65rem;
    font-size: 0.82rem;
  }
  .mb-num {
    font-family: var(--font-head);
    font-weight: 900;
    color: var(--blue);
    font-size: 1rem;
    flex-shrink: 0;
  }
  .mb-text { color: var(--dark); }

  /* Framework / blueprint block */
  .framework-block {
    margin-top: 1.75rem;
    background: var(--dark);
    border-radius: 10px;
    padding: 1.6rem 1.5rem;
  }
  .fb-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--yellow);
    margin-bottom: 0.75rem;
  }
  .framework-block > p {
    font-size: 0.88rem;
    color: rgba(255,255,255,0.7);
    line-height: 1.7;
  }
  .fb-kits {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.65rem;
    margin: 1.25rem 0 0;
  }
  @media(max-width:720px){ .fb-kits { grid-template-columns: repeat(2, 1fr); } }
  @media(max-width:420px){ .fb-kits { grid-template-columns: 1fr; } }
  .fb-kit {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 0.9rem 0.85rem;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
  .fb-kit-done {
    background: rgba(255,194,32,0.12);
    border-color: rgba(255,194,32,0.3);
  }
  .fb-kit-icon { font-size: 1.3rem; }
  .fb-kit-name { font-size: 0.8rem; font-weight: 700; color: #fff; line-height: 1.25; }
  .fb-kit-status { font-size: 0.65rem; color: rgba(255,255,255,0.45); line-height: 1.4; }
  .fb-kit-done .fb-kit-status { color: var(--yellow); }

  /* Tradeoff decision block */
  .tradeoff-box {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-top: 1rem;
  }
  @media(max-width:600px){ .tradeoff-box { grid-template-columns: 1fr; } }
  .tb-col {
    padding: 1.1rem 1.25rem;
    background: #fff;
  }
  .tb-col:first-child { background: rgba(116,118,124,0.06); }
  .tb-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .tb-col:last-child .tb-label { color: var(--blue); }
  .tb-col p { font-size: 0.82rem; color: var(--dark); line-height: 1.65; }
  .tb-divider {
    width: 1px;
    background: var(--border);
  }
  @media(max-width:600px){ .tb-divider { width: 100%; height: 1px; } }

  /* Business cost block */
  .biz-cost {
    margin: 1.5rem 0;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .bc-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.65rem 1.25rem;
    background: var(--light);
    border-bottom: 1px solid var(--border);
  }
  .bc-items {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    background: #fff;
  }
  @media(max-width:640px){ .bc-items { grid-template-columns: 1fr; } }
  .bc-item {
    padding: 1rem 1.25rem;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .bc-item:last-child { border-right: none; }
  .bc-icon { font-size: 1.1rem; }
  .bc-item p { font-size: 0.8rem; color: var(--dark); line-height: 1.6; }

  /* Capture placeholders */
  .capture-ph {
    margin-top: 1.25rem;
    border: 1.5px dashed #b8c7e0;
    border-radius: 8px;
    background: #f7f9fc;
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .capture-ph-sm { padding: 0.9rem 1.1rem; margin-top: 0.9rem; }
  .cap-badge {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue);
    background: rgba(0,82,226,0.08);
    border: 1px solid rgba(0,82,226,0.15);
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    align-self: flex-start;
  }
  .cap-title { font-size: 0.88rem; font-weight: 700; color: #3a4a5c; margin-top: 0.2rem; }
  .cap-desc  { font-size: 0.75rem; color: #7a8fa8; line-height: 1.55; }
  .section.dark .capture-ph { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.14); }
  .section.dark .cap-badge   { color: var(--blue2); background: rgba(78,189,245,0.12); border-color: rgba(78,189,245,0.2); }
  .section.dark .cap-title   { color: rgba(255,255,255,0.7); }
  .section.dark .cap-desc    { color: rgba(255,255,255,0.35); }

  .quote-grid.three-col { grid-template-columns: repeat(3, 1fr); }
  @media(max-width:700px){ .quote-grid.three-col { grid-template-columns: 1fr; } }

  /* Subsection headings */
  .subsection-head {
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--dark);
    margin-top: 2.5rem;
    margin-bottom: 0;
  }

  /* Roadmap 4-column grid */
  .gen-journey.four-step { grid-template-columns: repeat(4, 1fr); }
  @media(max-width:760px){ .gen-journey.four-step { grid-template-columns: repeat(2,1fr); } }
  @media(max-width:440px){ .gen-journey.four-step { grid-template-columns: 1fr; } }

  /* Stat row in problem section */
  .kit-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin: 1.75rem 0; }
  @media(max-width:600px){ .kit-stats { grid-template-columns: 1fr 1fr; } }
  .kit-stat { background: var(--dark); border-radius: 8px; padding: 1.5rem 1rem; text-align: center; }
  .kit-stat .big { font-family: var(--font-head); font-size: 2.2rem; color: var(--yellow); line-height: 1; }
  .kit-stat .lbl { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 0.35rem; line-height: 1.4; }

  /* Tooling stack card */
  .tool-stack { display: grid; grid-template-columns: repeat(2,1fr); gap: 0.85rem; margin-top: 1rem; }
  @media(max-width:580px){ .tool-stack { grid-template-columns: 1fr; } }
  .tool-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.1rem; display: flex; gap: 0.75rem; align-items: flex-start; }
  .tool-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 0.05rem; }
  .tool-card h4 { font-size: 0.88rem; font-weight: 700; color: var(--dark); margin-bottom: 0.2rem; }
  .tool-card p  { font-size: 0.8rem; color: var(--muted); line-height: 1.55; }


  /* Inline SVG icon coloring (replacing emoji) */
  .ff-icon svg{display:block}
  .ff-platform .ff-icon svg{color:#fff}
  .ff-org .ff-icon svg{color:var(--blue)}
  .uc-icon svg{display:block;color:#fff}
  .tool-icon svg{display:block;color:var(--blue)}
  .fb-kit-icon svg{display:block;color:rgba(255,255,255,0.55)}
  .fb-kit-done .fb-kit-icon svg{color:var(--yellow)}
  .ui-swatch-icon svg{display:block}
  .ui-helpful svg{display:inline-block;vertical-align:middle;margin:0 1px;}
</style>
</head>
